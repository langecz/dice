<div class="current-game-log">
  @for (round of logData(); track round.header) {
    <mat-card class="round-card">
      <mat-card-header>
        <mat-card-title>{{ round.header }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-list>
          @for (turn of round.turns; track turn) {
            <mat-list-item class="player-item">
              <div class="turn-item">
                <div class="turn-info">
                  <div class="turn-header">
                    <span class="player-name">{{ turn.playerName }}</span>
                    @if (turn.teamName) {
                      <span class="team-name">({{ turn.teamName }})</span>
                    }
                  </div>
                  <div class="turn-points">
                    <span class="points-rolled">{{ turn.points }} points</span>
                  </div>
                </div>

                @if (turn.isLast) {
                  <button matFab class="btn-warn" (click)="startEdit(turn)" aria-label="Edit points">
                    <mat-icon>edit</mat-icon>
                  </button>
                }
              </div>
            </mat-list-item>
          }
        </mat-list>
      </mat-card-content>
    </mat-card>
  } @empty {
    <p>No rolls yet in this game.</p>
  }
</div>
