<div class="setup-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Game Setup</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (!isOrdering()) {
        <app-game-config
          [initialPlayers]="players()"
          [initialTeams]="teams()"
          [initialConfig]="config()"
          (configComplete)="onConfigComplete($event)"
        ></app-game-config>
      } @else {
        <app-player-ordering
          [players]="players()"
          [teams]="teams()"
          [gameMode]="config().gameMode"
          (orderConfirmed)="startGame($event)"
          (backToConfig)="backToSetup()"
        ></app-player-ordering>
      }
    </mat-card-content>
  </mat-card>
</div>
