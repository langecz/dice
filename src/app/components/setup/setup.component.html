<div class="setup-container">
  <mat-card>
    <div class="card-header-row" >
        <mat-card-title>Game Setup</mat-card-title>
      <span class="spacer"></span>
      <button
        matButton="filled"
        class="btn-warn"
        (click)="confirmReset()"
        aria-label="Reset game to initial state"
      >
        Reset
      </button>
    </div>

    <mat-card-content>
      @if (!isOrdering()) {
        <app-game-config
          [initialPlayers]="players()"
          [initialTeams]="teams()"
          [initialConfig]="config()"
          (configComplete)="onConfigComplete($event)"
        ></app-game-config>
      } @else {
        <app-player-ordering
          [players]="players()"
          [teams]="teams()"
          [gameMode]="config().gameMode"
          (orderConfirmed)="startGame($event)"
          (backToConfig)="backToSetup()"
        ></app-player-ordering>
      }
    </mat-card-content>
  </mat-card>
</div>
